version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dataops:dataops@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: '81HqDtbfar23ecsHycBMnCVCBMtN-pHPpKLyFfGUKk0='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Pipeline DB connection (same host, different database)
    DATAOPS_DB_HOST: postgres
    DATAOPS_DB_PORT: 5432
    DATAOPS_DB_NAME: dataops
    DATAOPS_DB_USER: dataops
    DATAOPS_DB_PASSWORD: dataops
    DATAOPS_DATA_DIR: /opt/airflow/data
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — stores both Airflow metadata AND
  # our three-layer warehouse (raw / staging / warehouse)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops
      POSTGRES_DB: dataops
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dataops", "-d", "dataops"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # Airflow bootstrap — runs once, then exits
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@dataops.local \
          --password admin
        echo "Airflow init complete."
    restart: "no"

  # ──────────────────────────────────────────────
  # Airflow webserver  →  http://localhost:8080
  # ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Airflow scheduler
  # ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Metabase  →  http://localhost:3000
  # Connect to: postgres:5432 / dataops / warehouse schema
  # ──────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.48.6
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: dataops
      MB_DB_PORT: 5432
      MB_DB_USER: dataops
      MB_DB_PASS: dataops
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  airflow_logs:
